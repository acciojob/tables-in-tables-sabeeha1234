<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <table style="width: 100%; height: 100%">
      <!-- Your code here -->
		<table>
  <tr>
    <td>

      <!-- Nested Table 1 -->
      <table>
        <tr>
          <th>Nested Table 1</th>
        </tr>
        <tr>
          <td>Table 1 Data</td>
        </tr>
      </table>

    </td>

    <td>

      <!-- Nested Table 2 -->
      <table>
        <thead>
          <tr>
            <th>Nested Table 2</th>
            <th>Column 1</th>
            <th>Column 2</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td rowspan="2">Row 1</td>
            <td>Data 1</td>
            <td>Data 2</td>
          </tr>
          <tr>
            <td>Data 3</td>
            <td>Data 4</td>
          </tr>
        </tbody>
      </table>

    </td>
  </tr>

  <tr>
    <td>

      <!-- Nested Table 3 with List -->
      <table>
        <tr>
          <th>Nested Table 3</th>
        </tr>
        <tr>
          <td>
            <ul>
              <li>List item 1</li>
              <li>List item 2</li>
              <li>List item 3</li>
            </ul>
          </td>
        </tr>
      </table>

    </td>

    <td>

      <!-- Nested Table 4 with HTML cell -->
      <table>
        <tr>
          <th>Nested Table 4</th>
        </tr>
        <tr>
          <td style="background-color: black; color: white;">
            HTML
          </td>
        </tr>
      </table>

    </td>
  </tr>
</table>
    </table>
  </body>
</html>
